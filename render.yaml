services:
  - type: web
    name: sheltr
    runtime: docker
    repo: https://github.com/YOUR_USERNAME/sheltr  # Update this
    branch: main
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: PROJECT_URL
        sync: false
      - key: PUBLISHABLE_KEY
        sync: false
    healthCheckPath: /health
    region: frankfurt  # or frankfurt for EU